<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stronger Steps - Plan, Learn, and Practice</title>
    <meta name="description" content="Consistently Plan, Learn and Practice. Small steps today create stronger habits and a better tomorrow.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* HERO SECTION - NEW DESIGN */
        .hero {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 100%);
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        .hero-content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-left {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            color: #0a1f4d;
            margin: 0;
        }

        .hero-title .highlight {
            color: #1e5eff;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #4a5568;
            line-height: 1.6;
            margin: 0;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1e5eff;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .hero-cta:hover {
            background: #1547cc;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(30, 94, 255, 0.3);
        }

        .hero-right {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .step-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .step-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }

        .step-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-card:nth-child(1) .step-number {
            background: #e3euff;
            color: #1e5eff;
        }

        .step-card:nth-child(2) .step-number {
            background: #e8f5e9;
            color: #2d8659;
        }

        .step-card:nth-child(3) .step-number {
            background: #f3e5ff;
            color: #7c3aed;
        }

        .step-content h3 {
            font-size: 20px;
            font-weight: 700;
            color: #0a1f4d;
            margin: 0 0 8px 0;
        }

        .step-content p {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
            line-height: 1.5;
        }

        .step-icon {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 20px;
            }

            .hero-content-wrapper {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .hero-title {
                font-size: 32px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            .step-card {
                padding: 24px;
                gap: 16px;
            }

            .step-number {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }

            .step-icon {
                width: 64px;
                height: 64px;
            }

            .step-content h3 {
                font-size: 18px;
            }

            .step-content p {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER CONTAINER -->
    <div id="header-container"></div>

    <!-- HERO SECTION -->
    <section class="hero" id="home">
        <div class="hero-content-wrapper">
            <!-- Left Side Content -->
            <div class="hero-left">
                <h1 class="hero-title">Consistently <span class="highlight">Plan, Learn</span> and <span class="highlight">Practice</span></h1>
                <p class="hero-subtitle">Small steps today create stronger habits and a better tomorrow.</p>
                <button class="hero-cta">Start Your Journey →</button>
            </div>

            <!-- Right Side Steps -->
            <div class="hero-right">
                <!-- Step 1: Plan -->
                <div class="step-card">
                    <div class="step-number">01</div>
                    <div class="step-content">
                        <h3>Plan</h3>
                        <p>Set goals. Create your roadmap.</p>
                    </div>
                    <svg class="step-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Clipboard illustration -->
                        <rect x="20" y="15" width="80" height="100" rx="4" fill="#e3euff" stroke="#1e5eff" stroke-width="2"/>
                        <rect x="20" y="15" width="80" height="20" rx="4" fill="#1e5eff"/>
                        <circle cx="30" cy="25" r="4" fill="white"/>
                        <!-- Checkmarks -->
                        <g stroke="#1e5eff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <!-- First checkbox -->
                            <rect x="30" y="50" width="12" height="12" rx="2" fill="none"/>
                            <path d="M33 55L36 58L41 50"/>
                            <!-- Second checkbox -->
                            <rect x="30" y="72" width="12" height="12" rx="2" fill="none"/>
                            <path d="M33 77L36 80L41 72"/>
                            <!-- Third checkbox -->
                            <rect x="30" y="94" width="12" height="12" rx="2" fill="none"/>
                            <path d="M33 99L36 102L41 94"/>
                        </g>
                        <!-- Lines for text -->
                        <line x1="50" y1="56" x2="85" y2="56" stroke="#ccc" stroke-width="1.5"/>
                        <line x1="50" y1="78" x2="85" y2="78" stroke="#ccc" stroke-width="1.5"/>
                        <line x1="50" y1="100" x2="85" y2="100" stroke="#ccc" stroke-width="1.5"/>
                        <!-- Clock icon -->
                        <circle cx="95" cy="75" r="12" fill="none" stroke="#1e5eff" stroke-width="2"/>
                        <line x1="95" y1="68" x2="95" y2="75" stroke="#1e5eff" stroke-width="2"/>
                        <line x1="95" y1="75" x2="101" y2="75" stroke="#1e5eff" stroke-width="2"/>
                    </svg>
                </div>

                <!-- Step 2: Learn -->
                <div class="step-card">
                    <div class="step-number">02</div>
                    <div class="step-content">
                        <h3>Learn</h3>
                        <p>Gain knowledge. Understand better.</p>
                    </div>
                    <svg class="step-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Open book illustration -->
                        <path d="M30 30 Q30 20 40 20 L80 20 Q90 20 90 30 L90 100 Q90 110 80 110 L40 110 Q30 110 30 100 Z" fill="#e8f5e9" stroke="#2d8659" stroke-width="2"/>
                        <line x1="60" y1="20" x2="60" y2="110" stroke="#2d8659" stroke-width="2"/>
                        <!-- Left page text lines -->
                        <line x1="38" y1="40" x2="55" y2="40" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <line x1="38" y1="50" x2="55" y2="50" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <line x1="38" y1="60" x2="55" y2="60" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <line x1="38" y1="70" x2="55" y2="70" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <!-- Right page text lines -->
                        <line x1="65" y1="40" x2="82" y2="40" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <line x1="65" y1="50" x2="82" y2="50" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <line x1="65" y1="60" x2="82" y2="60" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <line x1="65" y1="70" x2="82" y2="70" stroke="#2d8659" stroke-width="1.5" opacity="0.6"/>
                        <!-- Decorative leaf -->
                        <g transform="translate(70, 90)">
                            <ellipse cx="0" cy="0" rx="6" ry="10" fill="#2d8659" opacity="0.6"/>
                            <line x1="-4" y1="5" x2="4" y2="-5" stroke="#2d8659" stroke-width="1" opacity="0.4"/>
                        </g>
                    </svg>
                </div>

                <!-- Step 3: Practice -->
                <div class="step-card">
                    <div class="step-number">03</div>
                    <div class="step-content">
                        <h3>Practice</h3>
                        <p>Apply regularly. Improve consistently.</p>
                    </div>
                    <svg class="step-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Target/Bullseye illustration -->
                        <circle cx="60" cy="60" r="45" fill="#f3e5ff" stroke="#7c3aed" stroke-width="2"/>
                        <circle cx="60" cy="60" r="32" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
                        <circle cx="60" cy="60" r="19" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
                        <circle cx="60" cy="60" r="6" fill="#7c3aed"/>
                        <!-- Arrow pointing to center -->
                        <g transform="translate(95, 25)" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="0" y1="0" x2="-20" y2="30"/>
                            <polygon points="0,0 -5,20 -2,15" fill="#7c3aed"/>
                        </g>
                    </svg>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER CONTAINER -->
    <div id="footer-container"></div>

    <!-- SCRIPT LOADING -->
    <script src="includes.js"></script>
    <script src="header.js"></script>
    <script src="footer.js"></script>
</body>
</html>
