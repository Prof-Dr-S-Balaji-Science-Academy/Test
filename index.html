<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prof. Dr. S. Balaji Science Academy</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="hero-section">
        <div class="hero-container">
            
            <div class="hero-content">
                <h1><span class="dark-text">Consistently</span><br>
                    <span class="blue-text">Plan, Learn<br>and Practice</span>
                </h1>
                <p>Small steps today create<br>stronger habits and a better tomorrow.</p>
                <a href="#" class="btn btn-primary btn-large">Start Your Journey &rarr;</a>
            </div>

            <div class="hero-cards">
                
                <div class="card card-plan">
                    <div class="card-number">01</div>
                    <h3>Plan</h3>
                    <p>Set goals.<br>Create your<br>roadmap.</p>
                    <div class="card-icon">
                        <svg width="100" height="100" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="30" y="20" width="50" height="70" rx="4" fill="#E0EDFF" stroke="#1E50B5" stroke-width="4"/>
                            <path d="M40 35H70M40 45H70M40 55H60" stroke="#1E50B5" stroke-width="4" stroke-linecap="round"/>
                            <rect x="40" y="10" width="30" height="15" rx="2" fill="#1E50B5"/>
                            <circle cx="75" cy="85" r="20" fill="white" stroke="#1E50B5" stroke-width="4"/>
                            <path d="M75 75V85L82 90" stroke="#1E50B5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <div class="card card-learn">
                    <div class="card-number">02</div>
                    <h3>Learn</h3>
                    <p>Gain knowledge.<br>Understand<br>better.</p>
                    <div class="card-icon">
                        <svg width="120" height="100" viewBox="0 0 140 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M70 80V30C70 30 50 20 20 25V75C50 70 70 80 70 80Z" fill="#E6F4EA" stroke="#2E7D32" stroke-width="4" stroke-linejoin="round"/>
                            <path d="M70 80V30C70 30 90 20 120 25V75C90 70 70 80 70 80Z" fill="#E6F4EA" stroke="#2E7D32" stroke-width="4" stroke-linejoin="round"/>
                            <path d="M30 40C45 38 60 42 65 45" stroke="#2E7D32" stroke-width="3" stroke-linecap="round"/>
                            <path d="M30 50C45 48 60 52 65 55" stroke="#2E7D32" stroke-width="3" stroke-linecap="round"/>
                            <path d="M110 40C95 38 80 42 75 45" stroke="#2E7D32" stroke-width="3" stroke-linecap="round"/>
                            <path d="M110 50C95 48 80 52 75 55" stroke="#2E7D32" stroke-width="3" stroke-linecap="round"/>
                            <circle cx="70" cy="55" r="12" fill="#153675"/>
                            <path d="M45 95C45 80 55 70 70 70C85 70 95 80 95 95" fill="#153675"/>
                        </svg>
                    </div>
                </div>

                <div class="card card-practice">
                    <div class="card-number">03</div>
                    <h3>Practice</h3>
                    <p>Apply regularly.<br>Improve<br>consistently.</p>
                    <div class="card-icon">
                        <svg width="100" height="100" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="60" cy="70" r="35" fill="#F3E5F5" stroke="#673AB7" stroke-width="6"/>
                            <circle cx="60" cy="70" r="20" fill="white" stroke="#673AB7" stroke-width="6"/>
                            <circle cx="60" cy="70" r="6" fill="#673AB7"/>
                            <path d="M100 20L65 55" stroke="#1E50B5" stroke-width="6" stroke-linecap="round"/>
                            <path d="M100 20L85 20L90 35L100 20Z" fill="#1E50B5"/>
                            <path d="M80 35L90 45" stroke="#1E50B5" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
</body>
</html>
