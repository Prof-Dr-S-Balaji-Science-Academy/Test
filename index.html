<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prof. Dr. S. Balaji Science Academy</title>
    <link rel="stylesheet" href="css/header-footer.css">
    <link rel="stylesheet" href="css/hero.css">
</head>
<body>
    <site-header></site-header>
    
    <main class="hero-section">
        <!-- Hero Content -->
        <div class="hero-container">
            <div class="hero-left">
                <h1 class="hero-title">Consistently <span class="highlight">Plan, Learn</span><br>and Practice</h1>
                <p class="hero-subtitle">Small steps today create stronger habits and a better tomorrow.</p>
                <button class="cta-button">Start Your Journey →</button>
            </div>
            
            <div class="hero-right">
                <!-- SVG Cards Container -->
                <div class="cards-container">
                    <!-- Card 01: Plan -->
                    <div class="card card-plan">
                        <div class="card-number">01</div>
                        <h3 class="card-title">Plan</h3>
                        <p class="card-description">Set goals. Create your roadmap.</p>
                        <div class="card-icon">
                            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                                <!-- Clock circle -->
                                <circle cx="60" cy="60" r="45" fill="#E3F0FF" stroke="#1E40AF" stroke-width="2"/>
                                <!-- Clock hands -->
                                <line x1="60" y1="40" x2="60" y2="60" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
                                <line x1="60" y1="60" x2="70" y2="60" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
                                <!-- Checkmarks -->
                                <g transform="translate(30, 35)">
                                    <rect x="0" y="0" width="35" height="40" rx="3" fill="none" stroke="#1E40AF" stroke-width="2"/>
                                    <polyline points="8,15 12,20 20,10" fill="none" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    <polyline points="8,28 12,33 20,23" fill="none" stroke="#1E40AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </g>
                            </svg>
                        </div>
                    </div>
                    
                    <!-- Card 02: Learn -->
                    <div class="card card-learn">
                        <div class="card-number">02</div>
                        <h3 class="card-title">Learn</h3>
                        <p class="card-description">Gain knowledge. Understand better.</p>
                        <div class="card-icon">
                            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                                <!-- Book -->
                                <path d="M30 35 Q30 30 35 30 L85 30 Q90 30 90 35 L90 80 Q90 85 85 85 L35 85 Q30 85 30 80 Z" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
                                <!-- Book spine -->
                                <line x1="35" y1="30" x2="35" y2="85" stroke="#2E7D32" stroke-width="2"/>
                                <!-- Pages -->
                                <line x1="40" y1="40" x2="80" y2="40" stroke="#2E7D32" stroke-width="1.5"/>
                                <line x1="40" y1="50" x2="80" y2="50" stroke="#2E7D32" stroke-width="1.5"/>
                                <line x1="40" y1="60" x2="75" y2="60" stroke="#2E7D32" stroke-width="1.5"/>
                                <line x1="40" y1="70" x2="75" y2="70" stroke="#2E7D32" stroke-width="1.5"/>
                                <!-- Plant leaf -->
                                <ellipse cx="50" cy="90" rx="8" ry="12" fill="#2E7D32" opacity="0.6"/>
                                <ellipse cx="45" cy="95" rx="6" ry="10" fill="#2E7D32" opacity="0.4"/>
                            </svg>
                        </div>
                    </div>
                    
                    <!-- Card 03: Practice -->
                    <div class="card card-practice">
                        <div class="card-number">03</div>
                        <h3 class="card-title">Practice</h3>
                        <p class="card-description">Apply regularly. Improve consistently.</p>
                        <div class="card-icon">
                            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                                <!-- Target circles -->
                                <circle cx="60" cy="60" r="40" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.3"/>
                                <circle cx="60" cy="60" r="28" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.5"/>
                                <circle cx="60" cy="60" r="16" fill="#EDE9FE"/>
                                <!-- Center dot -->
                                <circle cx="60" cy="60" r="5" fill="#7C3AED"/>
                                <!-- Arrow -->
                                <g transform="translate(45, 30)">
                                    <path d="M 15 5 L 28 15 L 20 28 L 15 18 Z" fill="#7C3AED"/>
                                </g>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <!-- Person Illustration -->
                <div class="illustration-container">
                    <svg viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg" class="person-illustration">
                        <!-- Background wave -->
                        <defs>
                            <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#F0F4FF;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#E8EDFF;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        
                        <!-- Decorative wave background -->
                        <path d="M 0 150 Q 50 130 100 150 T 200 150 L 200 250 L 0 250 Z" fill="url(#waveGradient)" opacity="0.6"/>
                        
                        <!-- Person body -->
                        <circle cx="100" cy="80" r="20" fill="#1E40AF"/>
                        
                        <!-- Person torso in blue -->
                        <ellipse cx="100" cy="130" rx="28" ry="35" fill="#1E40AF"/>
                        
                        <!-- Arms -->
                        <path d="M 72 120 Q 50 115 45 140" stroke="#1E40AF" stroke-width="8" fill="none" stroke-linecap="round"/>
                        <path d="M 128 120 Q 150 115 155 140" stroke="#1E40AF" stroke-width="8" fill="none" stroke-linecap="round"/>
                        
                        <!-- Legs -->
                        <line x1="90" y1="165" x2="85" y2="220" stroke="#1E40AF" stroke-width="7" stroke-linecap="round"/>
                        <line x1="110" y1="165" x2="115" y2="220" stroke="#1E40AF" stroke-width="7" stroke-linecap="round"/>
                        
                        <!-- Book in hand -->
                        <rect x="130" y="110" width="45" height="60" rx="3" fill="#2E7D32" opacity="0.8"/>
                        <line x1="130" y1="115" x2="175" y2="115" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
                        <line x1="130" y1="125" x2="175" y2="125" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
                        <line x1="130" y1="135" x2="175" y2="135" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
                        
                        <!-- Coffee cup -->
                        <g transform="translate(20, 190)">
                            <rect x="0" y="0" width="25" height="20" rx="2" fill="#8B4513" opacity="0.7"/>
                            <path d="M 28 5 Q 35 5 35 10 Q 35 15 28 15" stroke="#8B4513" stroke-width="2" fill="none" opacity="0.7"/>
                            <circle cx="12" cy="8" r="3" fill="#D2691E" opacity="0.5"/>
                        </g>
                        
                        <!-- Plant decoration -->
                        <g transform="translate(30, 200)">
                            <ellipse cx="0" cy="15" rx="12" ry="4" fill="#2E7D32" opacity="0.4"/>
                            <path d="M -8 10 Q -10 5 -8 0" stroke="#2E7D32" stroke-width="2" fill="none" opacity="0.6"/>
                            <path d="M 0 10 Q 0 2 0 -5" stroke="#2E7D32" stroke-width="2" fill="none" opacity="0.6"/>
                            <path d="M 8 10 Q 10 5 8 0" stroke="#2E7D32" stroke-width="2" fill="none" opacity="0.6"/>
                            <ellipse cx="-8" cy="-3" rx="4" ry="6" fill="#2E7D32" opacity="0.7"/>
                            <ellipse cx="0" cy="-8" rx="4" ry="6" fill="#2E7D32" opacity="0.7"/>
                            <ellipse cx="8" cy="-3" rx="4" ry="6" fill="#2E7D32" opacity="0.7"/>
                        </g>
                    </svg>
                </div>
            </div>
        </div>
        
        <!-- Decorative wave background -->
        <svg class="wave-background" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <defs>
                <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#E3F0FF;stop-opacity:0.4" />
                    <stop offset="50%" style="stop-color:#F0E8FF;stop-opacity:0.3" />
                    <stop offset="100%" style="stop-color:#E8F5E9;stop-opacity:0.3" />
                </linearGradient>
            </defs>
            <path fill="url(#bgGradient)" d="M0,96L48,112C96,128,192,160,288,154.7C384,149,480,107,576,112C672,117,768,171,864,170.7C960,171,1056,117,1152,96C1248,75,1344,85,1392,90.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
        </svg>
    </main>
    
    <site-footer></site-footer>
    
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
